<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الملحمة - الحضور والانصراف</title>
    <style>
        /* ========== الأنماط الأساسية ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b2a4f 0%, #1b4a6b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 950px;
            width: 100%;
            margin: auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 30px 25px;
            box-shadow: 0 30px 60px rgba(0, 20, 30, 0.5);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ========== الهيدر ========== */
        .header {
            background: linear-gradient(135deg, #0f2b4b, #1d4e6f);
            color: white;
            padding: 30px 20px;
            border-radius: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: inset 0 -3px 10px rgba(0,0,0,0.2);
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .header h1 span { font-size: 40px; }
        .header p {
            font-size: 18px;
            opacity: 0.9;
            background: rgba(255,255,255,0.15);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
        }

        /* ========== بطاقة الموقع ========== */
        .location-card {
            background: #e9f0fa;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #a3c6ff;
            text-align: center;
        }
        .coords-box {
            background: #0b2a4f;
            color: #fff;
            padding: 12px;
            border-radius: 60px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            letter-spacing: 1px;
            margin: 15px auto 10px;
            display: inline-block;
            direction: ltr;
        }
        .range-badge {
            background: #ff9800;
            color: #1a1a2e;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 20px;
            border: 2px solid white;
        }

        /* ========== مؤشرات الحالة ========== */
        .status-box {
            padding: 18px;
            border-radius: 60px;
            margin: 20px 0;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .status-info { background: #d1e0ff; color: #103c6e; border: 2px solid #6a8cff; }
        .status-success {
            background: linear-gradient(145deg, #a3e0b0, #6fcf97);
            color: #004d1a;
            border: 2px solid #1b813e;
        }
        .status-error {
            background: linear-gradient(145deg, #ffb3b3, #ff8a8a);
            color: #a10000;
            border: 2px solid #c00000;
        }
        .distance-value {
            font-size: 36px;
            font-weight: 900;
            background: #162b3a;
            color: white;
            padding: 15px 30px;
            border-radius: 80px;
            display: inline-block;
            margin: 10px 0 15px;
            box-shadow: 0 5px 0 #0a1a24;
        }
        .check-btn {
            background: linear-gradient(145deg, #4158D0, #C850C0);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 70px;
            cursor: pointer;
            margin: 10px 0 20px;
            transition: 0.2s;
            box-shadow: 0 8px 0 #2a2080;
            width: auto;
            min-width: 280px;
        }
        .check-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #2a2080; }
        .check-btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 5px 0 #2a2080; }

        /* ========== أزرار النماذج ========== */
        .forms-section {
            margin-top: 35px;
            border-top: 3px dashed #9bb6d0;
            padding-top: 25px;
        }
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .action-btn {
            border: none;
            padding: 22px 20px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 70px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 230px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 7px 0 #9e9e9e;
        }
        .action-btn.attendance {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            color: white;
        }
        .action-btn.departure {
            background: linear-gradient(145deg, #e67e22, #d35400);
            color: white;
        }
        .action-btn.active {
            transform: scale(1.02);
            box-shadow: 0 0 0 4px white, 0 7px 0 #1e4a2b;
        }
        .action-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #6b6b6b; }

        /* ========== iframe ========== */
        .iframe-container {
            background: #eef5ff;
            border-radius: 30px;
            padding: 15px;
            margin-top: 10px;
            border: 2px solid #bdd3ff;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 25px;
            background: white;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        .refresh-btn {
            background: #3f5470;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 18px;
            margin: 15px 0 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .hidden { display: none; }
        .debug-info {
            font-size: 13px;
            color: #5f6b7a;
            margin-top: 15px;
            background: #eef2f6;
            padding: 8px;
            border-radius: 20px;
            direction: ltr;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- الهيدر -->
            <div class="header">
                <h1>
                    <span>📍</span> بوابة الملحمة <span>📍</span>
                </h1>
                <p>نظام تسجيل الحضور والانصراف</p>
            </div>

            <!-- معلومات الموقع -->
            <div class="location-card">
                <h2 style="color:#0f2b4b;">موقع الملحمة</h2>
                <div class="coords-box">
                    24.7833889, 46.7464722
                </div>
                <div class="range-badge">
                    ⚡ النطاق المسموح: 15 متر فقط
                </div>
            </div>

            <!-- منطقة الحالة -->
            <div id="statusMessage" class="status-box status-info">
                ⏳ جاري تحديد موقعك الجغرافي...
            </div>
            <div id="distanceDisplay" class="distance-value">--</div>

            <!-- زر التحقق -->
            <div>
                <button class="check-btn" onclick="checkLocation()" id="checkBtn">
                    🔍 تحقق من موقعي
                </button>
            </div>

            <!-- نماذج الحضور والانصراف (تظهر فقط بعد التحقق) -->
            <div id="formsSection" class="forms-section hidden">
                <div class="action-buttons">
                    <button id="btnAttendance" class="action-btn attendance active" onclick="showForm('attendance')">
                        <span>✅</span> تسجيل حضور
                    </button>
                    <button id="btnDeparture" class="action-btn departure" onclick="showForm('departure')">
                        <span>🚶</span> تسجيل انصراف
                    </button>
                </div>

                <!-- إطار الحضور -->
                <div id="formAttendance" class="iframe-container">
                    <iframe id="attendanceIframe"
                        src="https://docs.google.com/forms/d/e/1FAIpQLSd-3_Z4eLpywPVKWjlHY_ULMOntDGjNDiHEdQgFryxhHsNOPg/viewform?embedded=true"
                        allow="geolocation">
                    </iframe>
                </div>

                <!-- إطار الانصراف -->
                <div id="formDeparture" class="iframe-container hidden">
                    <iframe id="departureIframe"
                        src="https://docs.google.com/forms/d/e/1FAIpQLSeBgYai1STBhvqTux7Cl9yQQ0hYURa8i3b_RTY518RZC7RUbw/viewform?embedded=true"
                        allow="geolocation">
                    </iframe>
                </div>

                <button class="refresh-btn" onclick="refreshCurrentForm()">
                    🔄 تحديث النموذج الحالي
                </button>
            </div>

            <!-- معلومات تصحيح للمطور -->
            <div id="debugInfo" class="debug-info"></div>
        </div>
    </div>

    <script>
        // -------------------- الإعدادات الثابتة --------------------
        const TARGET = {
            lat: 24.7833889,
            lng: 46.7464722
        };
        const MAX_DISTANCE = 15; // 15 متر بالضبط

        const FORM_LINKS = {
            attendance: "https://docs.google.com/forms/d/e/1FAIpQLSd-3_Z4eLpywPVKWjlHY_ULMOntDGjNDiHEdQgFryxhHsNOPg/viewform",
            departure: "https://docs.google.com/forms/d/e/1FAIpQLSeBgYai1STBhvqTux7Cl9yQQ0hYURa8i3b_RTY518RZC7RUbw/viewform"
        };

        let currentFormType = 'attendance'; // attendance or departure

        // -------------------- دالة حساب المسافة (Haversine) --------------------
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // متر
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2 - lat1) * Math.PI/180;
            const Δλ = (lon2 - lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; // مسافة بالمتر
        }

        // -------------------- التبديل بين نموذج الحضور والانصراف --------------------
        window.showForm = function(type) {
            currentFormType = type;

            // تحديث شكل الأزرار
            document.getElementById('btnAttendance').classList.remove('active');
            document.getElementById('btnDeparture').classList.remove('active');
            if (type === 'attendance') {
                document.getElementById('btnAttendance').classList.add('active');
            } else {
                document.getElementById('btnDeparture').classList.add('active');
            }

            // إظهار الإطار المناسب
            document.getElementById('formAttendance').classList.add('hidden');
            document.getElementById('formDeparture').classList.add('hidden');
            document.getElementById(`form${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.remove('hidden');
        };

        // -------------------- تحديث النموذج الحالي --------------------
        window.refreshCurrentForm = function() {
            const iframeId = currentFormType === 'attendance' ? 'attendanceIframe' : 'departureIframe';
            const iframe = document.getElementById(iframeId);
            iframe.src = iframe.src; // إعادة تحميل
        };

        // -------------------- الوظيفة الرئيسية للتحقق من الموقع --------------------
        window.checkLocation = function() {
            const statusEl = document.getElementById('statusMessage');
            const distanceEl = document.getElementById('distanceDisplay');
            const formsSection = document.getElementById('formsSection');
            const checkBtn = document.getElementById('checkBtn');
            const debugEl = document.getElementById('debugInfo');

            statusEl.className = 'status-box status-info';
            statusEl.textContent = '⏳ انتظر... جلب الموقع بدقة عالية';
            checkBtn.disabled = true;
            formsSection.classList.add('hidden'); // نخفي النماذج مؤقتاً

            // التحقق من دعم المتصفح
            if (!navigator.geolocation) {
                statusEl.className = 'status-box status-error';
                statusEl.textContent = '❌ متصفحك لا يدعم خاصية تحديد الموقع';
                checkBtn.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(
                // حالة النجاح
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    // حساب المسافة
                    const dist = calculateDistance(userLat, userLng, TARGET.lat, TARGET.lng);

                    // عرض معلومات التصحيح
                    debugEl.innerHTML = `📡 موقعك: (${userLat.toFixed(6)}, ${userLng.toFixed(6)})<br>🎯 الدقة: ±${Math.round(accuracy)}م | المسافة: ${Math.round(dist)}م`;

                    // عرض المسافة بشكل مفهوم
                    if (dist < 1000) {
                        distanceEl.textContent = `🏃 ${Math.round(dist)} متر`;
                    } else {
                        distanceEl.textContent = `🚗 ${(dist/1000).toFixed(2)} كم`;
                    }

                    // --- القرار: داخل النطاق أم لا ---
                    if (dist <= MAX_DISTANCE) {
                        // داخل الـ 15 متر
                        statusEl.className = 'status-box status-success';
                        statusEl.textContent = `✅ أنت داخل الملحمة (على بعد ${Math.round(dist)}م)`;
                        formsSection.classList.remove('hidden'); // نعرض النماذج

                        // إضافة بارامترات التتبع للنماذج (اختياري)
                        const attIframe = document.getElementById('attendanceIframe');
                        const depIframe = document.getElementById('departureIframe');
                        const trackParam = `&lat=${userLat.toFixed(6)}&lng=${userLng.toFixed(6)}&d=${Math.round(dist)}`;
                        // نحدث الـ src مع الحفاظ على الـ embedded=true
                        attIframe.src = `${FORM_LINKS.attendance}?embedded=true${trackParam}`;
                        depIframe.src = `${FORM_LINKS.departure}?embedded=true${trackParam}`;

                    } else {
                        // خارج النطاق
                        statusEl.className = 'status-box status-error';
                        statusEl.textContent = `❌ خارج الملحمة! المسافة: ${Math.round(dist)}م (يسمح بـ ${MAX_DISTANCE}م فقط)`;
                        formsSection.classList.add('hidden');
                    }

                    checkBtn.disabled = false;
                },
                // حالة الخطأ
                (error) => {
                    let msg = '';
                    if (error.code === 1) msg = '❌ تم رفض الإذن. سماح بالموقع ضروري.';
                    else if (error.code === 2) msg = '❌ الموقع غير متوفر حالياً.';
                    else if (error.code === 3) msg = '❌ انتهت المهلة. حاول مجدداً.';
                    else msg = '❌ خطأ غير معروف.';

                    statusEl.className = 'status-box status-error';
                    statusEl.textContent = msg;
                    distanceEl.textContent = '--';
                    formsSection.classList.add('hidden');
                    checkBtn.disabled = false;
                    debugEl.innerHTML = `⚠️ ${error.message}`;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 12000,
                    maximumAge: 0
                }
            );
        };

        // -------------------- التشغيل التلقائي عند تحميل الصفحة --------------------
        window.onload = function() {
            checkLocation();
        };

        // عند العودة للصفحة (مثلاً بعد السماح بالموقع) نتحقق مجدداً
        window.addEventListener('focus', function() {
            // نتحقق مرة أخرى بعد ثانية واحدة
            setTimeout(checkLocation, 500);
        });
    </script>
</body>
</html>
